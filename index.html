<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Hunter 2D - Valeria Villeda</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="icon" href="assets/favicon.png" type="image/png">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-white d-flex flex-column min-vh-100">

    <header class="container-fluid py-3 bg-black border-bottom border-primary text-center shadow">
        <div class="d-flex justify-content-center align-items-center">
            <img src="assets/player_ship.png" alt="Logo Nave" style="width: 45px;">
            <h1 class="h3 mb-0 ms-3 text-uppercase tracking-widest">Space Hunter 2D</h1>
        </div>
    </header>

    <main class="container-fluid my-auto py-4">
        <div class="row justify-content-center align-items-center">
            
            <aside class="col-md-2 p-4 bg-dark border border-secondary rounded shadow-sm">
                <h5 class="text-info border-bottom pb-2">Instrucciones</h5>
                <p class="small">Apunta con el <strong>mouse</strong>.</p>
                <p class="small">Haz <strong>clic</strong> para disparar plasma.</p>
                <hr class="border-secondary">
                <p class="mb-0 text-secondary small">Eliminados:</p>
                <div id="contador" class="display-5 fw-bold text-info">0</div> 
            </aside>

            <div class="col-md-9 d-flex justify-content-center">
                <canvas id="canvas" class="border border-info shadow-lg rounded"></canvas>
            </div>

        </div>
    </main>

    <footer class="container-fluid py-3 bg-black border-top border-secondary text-center">
        <p class="mb-0 small text-secondary">
            <strong>Valeria Abigail Villeda Hernández</strong> | 24200103 | Examen Unidad II
        </p>
    </footer>

    <audio id="musicaFondo" loop>
        <source src="assets/space_music.mp3" type="audio/mpeg">
    </audio>

    <script src="colision.js"></script>
    <script>
        // Función para activar audio y fondo tras interacción
        window.addEventListener('mousedown', () => {
            const audio = document.getElementById('musicaFondo');
            if (audio.paused) {
                audio.play().catch(e => console.log("Audio bloqueado: ", e));
            }
        }, { once: true });
    </script>

</body>
</html>
